services:
  postgres:
    image: postgres:16-alpine
    container_name: invisionu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invisionu}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-invisionu}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: invisionu_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invisionu_backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      API_KEY: ${API_KEY:?API_KEY must be set}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:?PII_ENCRYPTION_KEY must be set}
      AUDIT_SIGNING_KEY: ${AUDIT_SIGNING_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      M5_LLM_MODEL: ${M5_LLM_MODEL:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-invisionu}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PIPELINE_QUEUE_BACKEND: ${PIPELINE_QUEUE_BACKEND:-redis}
      PIPELINE_QUEUE_NAME: ${PIPELINE_QUEUE_NAME:-invisionu:pipeline:jobs}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PIPELINE_WORKER_POLL_TIMEOUT_SECONDS: ${PIPELINE_WORKER_POLL_TIMEOUT_SECONDS:-1}
      SUBMIT_RATE_LIMIT_PER_MINUTE: ${SUBMIT_RATE_LIMIT_PER_MINUTE:-60}
      BATCH_RATE_LIMIT_PER_MINUTE: ${BATCH_RATE_LIMIT_PER_MINUTE:-10}
      REVIEWER_RATE_LIMIT_PER_MINUTE: ${REVIEWER_RATE_LIMIT_PER_MINUTE:-120}
    command:
      [
        "sh",
        "-c",
        "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  pipeline_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invisionu_pipeline_worker
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      API_KEY: ${API_KEY:?API_KEY must be set}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:?PII_ENCRYPTION_KEY must be set}
      AUDIT_SIGNING_KEY: ${AUDIT_SIGNING_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      M5_LLM_MODEL: ${M5_LLM_MODEL:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-invisionu}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PIPELINE_QUEUE_BACKEND: ${PIPELINE_QUEUE_BACKEND:-redis}
      PIPELINE_QUEUE_NAME: ${PIPELINE_QUEUE_NAME:-invisionu:pipeline:jobs}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PIPELINE_WORKER_POLL_TIMEOUT_SECONDS: ${PIPELINE_WORKER_POLL_TIMEOUT_SECONDS:-1}
      SUBMIT_RATE_LIMIT_PER_MINUTE: ${SUBMIT_RATE_LIMIT_PER_MINUTE:-60}
      BATCH_RATE_LIMIT_PER_MINUTE: ${BATCH_RATE_LIMIT_PER_MINUTE:-10}
      REVIEWER_RATE_LIMIT_PER_MINUTE: ${REVIEWER_RATE_LIMIT_PER_MINUTE:-120}
    command:
      [
        "sh",
        "-c",
        "python -m alembic upgrade head && python -m app.modules.m1_gateway.worker",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invisionu_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      BACKEND_URL: http://backend:8000
      REVIEWER_API_KEY: ${API_KEY:?API_KEY must be set}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
