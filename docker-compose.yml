services:
  postgres:
    image: postgres:16-alpine
    container_name: invisionu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invisionu}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-invisionu}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invisionu_backend
    restart: unless-stopped
    gpus: all
    environment:
      API_KEY: ${API_KEY:-test-reviewer-key}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-change-me-to-a-32-byte-minimum-secret-for-development}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      M5_LLM_MODEL: ${M5_LLM_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      M13_ASR_MODEL: ${M13_ASR_MODEL:-whisper-large-v3-turbo}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-jinaai/jina-embeddings-v5-text-nano}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-invisionu}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command:
      [
        "sh",
        "-c",
        "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invisionu_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      BACKEND_URL: http://backend:8000
      REVIEWER_API_KEY: ${API_KEY:-test-reviewer-key}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
