services:
  m6_eval:
    build:
      context: .
      dockerfile: backend/app/modules/m6_scoring/Dockerfile.m6
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command:
      [
        "python",
        "-m",
        "app.modules.m6_scoring.evaluation",
        "--train-samples",
        "300",
        "--test-samples",
        "120",
        "--out-dir",
        "backend/tests/m6_scoring/results/latest"
      ]

  m6_notebook:
    build:
      context: .
      dockerfile: backend/app/modules/m6_scoring/Dockerfile.m6
    working_dir: /workspace
    volumes:
      - ./:/workspace
    ports:
      - "8888:8888"
    command:
      [
        "jupyter",
        "lab",
        "--ip=0.0.0.0",
        "--port=8888",
        "--allow-root",
        "--no-browser",
        "backend/tests/m6_scoring/notebooks"
      ]
