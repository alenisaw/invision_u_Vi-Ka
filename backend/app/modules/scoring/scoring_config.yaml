status_order:
  - STRONG_RECOMMEND
  - RECOMMEND
  - WAITLIST
  - DECLINED

status_thresholds:
  strong_recommend_min: 0.78
  recommend_min: 0.65
  waitlist_min: 0.44
  declined_completeness_max: 0.50

confidence_band_thresholds:
  high_min: 0.78
  medium_min: 0.60

uncertainty_policy:
  hard_flags:
    - requires_human_review
    - no_speech_detected
  declined_manual_review_score_min: 0.30
  low_confidence_max: 0.43
  low_signal_confidence_max: 0.53
  low_coverage_max: 0.35
  low_quality_completeness_max: 0.40
  disagreement_max: 0.30
  soft_caution_min: 4
  narrow_margin_max: 0.008
  instability_radius_base: 0.012
  instability_confidence_weight: 0.055
  instability_disagreement_weight: 0.060
  instability_low_quality_weight: 0.040
  manual_review_trigger_count: 3
  uncertainty_flag_trigger_count: 3

confidence_rules:
  mean_signal_confidence_risk_min: 0.58
  signal_coverage_risk_min: 0.58
  completeness_risk_min: 0.42
  hard_uncertainty_completeness_max: 0.35
  model_disagreement_risk_min: 0.20
  soft_caution_risk_min: 2
  weak_score_strength_max: 0.34
  weak_score_coverage_max: 0.68
  manual_review_risk_score_min: 3
  high_confidence_bonus_coverage_min: 0.85
  high_confidence_bonus_signal_confidence_min: 0.80
  high_confidence_bonus_value: 0.05
  soft_caution_penalty_step: 0.02
  soft_caution_penalty_max: 0.06

confidence_weights:
  mean_signal_confidence: 0.38
  signal_coverage: 0.24
  completeness: 0.18
  agreement: 0.10
  score_strength: 0.10

shortlist_eligible_statuses:
  - STRONG_RECOMMEND
  - RECOMMEND

modifier_signal_names:
  - authenticity_risk
  - essay_transcript_consistency
  - claims_evidence_match
  - ai_writing_risk
  - voice_consistency
  - specificity_score

critical_data_flags:
  - requires_human_review
  - low_asr_confidence
  - unclear_segments_high
  - no_speech_detected

soft_caution_flags:
  - authenticity_or_ai_risk
  - speech_authenticity_risk
  - low_cross_source_consistency
  - weak_claim_support
  - voice_inconsistency
  - generic_evidence

status_summary_templates:
  STRONG_RECOMMEND: "High-priority candidate with strong evidence and stable signals."
  RECOMMEND: "Positive candidate with enough evidence to move forward."
  WAITLIST: "Borderline candidate worth keeping in reserve for review."
  DECLINED: "Current signal quality or fit is not strong enough to move forward."
